<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4546A"/>
      <stop offset="100%" stop-color="#3D5A80"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F3EFE8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Centered circle -->
  <circle cx="600" cy="280" r="160" fill="white" filter="drop-shadow(0 8px 32px rgba(0,0,0,0.08))"/>

  <!-- jj text -->
  <text
    x="600" y="340"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="160"
    letter-spacing="-8"
    text-anchor="middle"
    fill="url(#g)"
  >jj</text>

  <!-- Name below -->
  <text
    x="600" y="510"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="36"
    letter-spacing="2"
    text-anchor="middle"
    fill="#57534E"
  >jennjordache.com</text>
</svg>
